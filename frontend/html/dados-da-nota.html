  <script>
    async function enviarDadosNota() {
        // 1. Pegamos os valores EXATAMENTE pelos nomes que estão nos inputs do HTML
        const numero = document.getElementById('numeroNota')?.value || "0";
        const valor = document.getElementById('valorNotaFiscal')?.value || "0,00";

        // Validação simples para não enviar vazio
        if (!numero || numero === "0") {
            alert("Por favor, preencha o número da nota.");
            return;
        }

        try {
            const response = await fetch('http://localhost:3001/api/salvar-nota', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    numeroNota: numero, 
                    valor: valor 
                })
            });

            const data = await response.json();

            if (data.sucesso) {
                console.log('Dados da nota salvos!');
                // 2. IMPORTANTE: Verifique se o nome do arquivo abaixo é exatamente o que está na sua pasta
                window.location.href = "./dados-do-pagamento.html";
            } else {
                alert('Erro ao salvar nota: ' + (data.erro || 'Erro desconhecido'));
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Certifique-se que o backend está rodando em http://localhost:3001');
        }
    }
</script>
