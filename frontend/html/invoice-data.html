<body>
  <div id="__next">
    <div class="Toastify"></div>
    <div id="root">
      <div class="styles_container__lAhF8">
        <div class="styles_wrapperLogged__vU1Lb">
          <!-- Cabeçalho -->
          <header class="styles_container__2Y_S2">
            <header>
              <img alt="Logo porto belo" loading="lazy" width="218" height="94" decoding="async" data-nimg="1"
                src="../img/logo.png" style="color: transparent" />
              <h1>PAGAMENTO DE FORNECEDOR</h1>
            </header>
            <section class="flex justify-between">
              <div>
                <p><strong>Razão Social: </strong></p>
                <p><strong>Nome Fantasia: </strong></p>
              </div>
              <p><strong>CNPJ: </strong></p>
            </section>
          </header>

          <!-- Conteúdo principal -->
          <main>
            <div class="styles_container__95z__">
              <div class="mt-4 mb-2 rounded border border-red-600 py-2">
                <p class="text-center text-xl font-bold">Dados da Nota Fiscal</p>
              </div>
              <section>
                <div class="flex">
                  <p><strong>Código do contrato:</strong></p>
                  <p class="ml-24"></p>
                </div>
                <form id="formRef" class="mt-8">
                  <!-- Campos da nota -->
                  <div class="flex space-x-8">
                    <div class="styles_container__vlAK4">
                      <label for="numeroNota">Número da Nota</label>
                      <input id="numeroNota" name="numeroNota" type="number" min="1" />
                    </div>
                    <div class="styles_container__vlAK4">
                      <label for="dataEmissao">Data de Emissão</label>
                      <input id="dataEmissao" name="dataEmissao" type="date" />
                    </div>
                    <div class="styles_container__vlAK4">
                      <label for="dataVencimento">Data de Vencimento</label>
                      <input id="dataVencimento" name="dataVencimento" type="date" />
                    </div>
                    <div class="styles_container__vlAK4">
                      <label for="valorNotaFiscal">Valor</label>
                      <div>
                        <input type="text" inputmode="decimal" id="valorNotaFiscal" name="valorNotaFiscal"
                          placeholder="R$ 0,00" autocomplete="off" />
                      </div>
                    </div>
                  </div>

                  <!-- Retenção de impostos -->
                  <div class="my-8 mb-4 flex">
                    <input type="checkbox" id="isTaxesRetention" class="mr-2" />
                    <label for="isTaxesRetention">Retenção de Impostos</label>
                  </div>

                  <!-- Campos de impostos -->
                  <fieldset>
                    <legend>Dados</legend>
                    <div class="flex space-x-8">
                      <div class="styles_container__vlAK4">
                        <label for="taxes.issqn">ISSQN</label>
                        <input type="text" id="taxes.issqn" name="taxes.issqn" placeholder="R$ 0,00"
                          autocomplete="off" />
                      </div>
                      <div class="styles_container__vlAK4">
                        <label for="taxes.irrf">IRRF</label>
                        <input type="text" id="taxes.irrf" name="taxes.irrf" placeholder="R$ 0,00" autocomplete="off" />
                      </div>
                      <div class="styles_container__vlAK4">
                        <label for="taxes.csll">CSLL</label>
                        <input type="text" id="taxes.csll" name="taxes.csll" placeholder="R$ 0,00" autocomplete="off" />
                      </div>
                      <div class="styles_container__vlAK4">
                        <label for="taxes.confins">COFINS</label>
                        <input type="text" id="taxes.confins" name="taxes.confins" placeholder="R$ 0,00"
                          autocomplete="off" />
                      </div>
                      <div class="styles_container__vlAK4">
                        <label for="taxes.inss">INSS</label>
                        <input type="text" id="taxes.inss" name="taxes.inss" placeholder="R$ 0,00" autocomplete="off" />
                      </div>
                      <div class="styles_container__vlAK4">
                        <label for="taxes.pis">PIS</label>
                        <input type="text" id="taxes.pis" name="taxes.pis" placeholder="R$ 0,00" autocomplete="off" />
                      </div>
                    </div>
                  </fieldset>

                  <!-- Retenção técnica -->
                  <div class="my-8 mb-4 flex">
                    <input type="checkbox" id="isTechnicalRetention" class="mr-2" />
                    <label for="isTechnicalRetention">Retenção Técnica</label>
                  </div>

                  <!-- Botão de upload -->
                  <div class="mt-8 flex items-center">
                    <button
                      class="rounded py-2 text-white transition-colors w-auto bg-tertiary px-8 text-2xl hover:bg-tertiary-hover"
                      type="button">
                      <p>Anexar Nota Fiscal</p>
                    </button>
                  </div>
                </form>
              </section>

              <!-- Navegação -->
              <div class="ml-auto mt-8 flex max-w-lg space-x-4">
                <button
                  class="w-full rounded px-16 py-2 text-white transition-colors bg-warning text-2xl font-semibold hover:bg-warning-hover"
                  type="button" onclick="window.history.back()">
                  <p>Anterior</p>
                </button>
                <button
                  class="w-full rounded bg-success px-16 py-2 text-white transition-colors hover:bg-success-hover text-2xl font-semibold"
                  type="button" onclick="sendInvoiceData()">
                  <p>Próxima</p>
                </button>
              </div>
            </div>
          </main>

          <!-- Rodapé -->
          <footer class="mt-auto flex items-center">
            <img alt="Logo porto belo" loading="lazy" width="218" height="94" decoding="async" data-nimg="1"
              class="h-12 w-24" src="../img/logo.png" style="color: transparent" />
            <div class="ml-32 text-center text-xs opacity-60">
              <p>@2022-2022 Construindo Patrimônios</p>
              <p>Porto Belo Construções - CNPJ </p>
            </div>
          </footer>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/invoice-data.js"></script>
</body>

</html>
