<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Porto Belo - Portal de Pagamento de Fornecedores</title>
    <meta name="description" content="Generated by create next app">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://portal.portobeloweb.com.br/favicon.png">
    <meta name="next-head-count" content="5">

    <!-- ===== Estilos globais (Next.js) ===== -->
    <link rel="preload" href="../style/style.css" as="style">
    <link rel="stylesheet" href="../style/style.css" data-n-g="">

    <!-- ===== Estilos da página /access ===== -->
    <link rel="preload" href="../style/f68765bab0b48352.css" as="style">
    <link rel="stylesheet" href="../style/f68765bab0b48352.css" data-n-p="">
    <noscript data-n-css=""></noscript>
  </head>

  <body>

    <!-- Ponto de entrada do Next.js -->
    <div id="__next">

      <!-- Container de notificações toast -->
      <div class="Toastify"></div>

      <!-- Raiz da aplicação -->
      <div id="root">

        <!-- Layout externo: centraliza o conteúdo na tela -->
        <div class="styles_container__lAhF8">
          <div class="styles_wrapper___F9_X">

            <main>

              <!-- Card central do formulário de acesso -->
              <div class="styles_container__7HoIs">

                <!-- Logo da Porto Belo -->
                <img alt="Logo porto belo" loading="lazy" width="218" height="94"
                src="../img/logo.png" />

                <!-- Título da seção -->
                <h2>PAGAMENTO DE FORNECEDOR</h2>

              <form class="styles_form__pLbUz" onsubmit="event.preventDefault();">
                <div class="styles_container__vlAK4">
                  <label for="cnpj">CNPJ</label>
                  <input id="cnpj" name="cnpj" autocomplete="off" class="undefined" placeholder="00.000.000/0000-00">
                </div>

                <button 
                  class="w-full rounded bg-success px-16 py-2 text-lg text-white transition-colors hover:bg-success-hover" 
                  type="button" 
                  onclick="enviarCnpj()"
                >
                  <p>Acessar</p>
                </button>
              </form>

            </div>
          </main>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function enviarCnpj() {
      // Pega o valor pelo ID que já está no seu input
      const cnpjInput = document.getElementById('cnpj');
      const cnpjDigitado = cnpjInput.value;

      if (!cnpjDigitado) {
        alert("Por favor, digite o CNPJ.");
        return;
      }

      try {
        const response = await fetch('http://localhost:3001/api/consultar-cnpj', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            cnpj: cnpjDigitado
          })
        });

        const data = await response.json();

        if (data.sucesso) {
          console.log('Fornecedor encontrado:', data.fornecedor);
          // Redireciona para a próxima etapa
          window.location.href = "./escolher-contrato.html";
        } else {
          alert('Erro: ' + (data.erro || "CNPJ não encontrado"));
        }
      } catch (error) {
        console.error('Erro ao conectar no back:', error);
        alert('Erro ao conectar no servidor. O backend está ligado na porta 3001?');
      }
    }
  </script>
</body>

</html>
