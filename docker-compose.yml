name: portobelo

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: portobelo/backend:latest
    container_name: portobelo-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://portobelo-backend:3001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - portobelo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: portobelo/frontend:latest
    container_name: portobelo-frontend
    restart: unless-stopped
    ports:
      - "5500:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://portobelo-frontend/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - portobelo-net

networks:
  portobelo-net:
    name: portobelo-net
    driver: bridge
